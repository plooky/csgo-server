hostname "My Docker CS:GO Server"
rcon_password "CHANGE_ME"
sv_password ""

sv_lan 0
sv_cheats 0
sv_allowupload 0
sv_allowdownload 1

// Update with your public FastDL URL.
// Example: http://203.0.113.10:8080/csgo
sv_downloadurl "http://YOUR_PUBLIC_HOST:8080/csgo"

// Replace with your real GSLT from Steam Game Server Account Management.
sv_setsteamaccount "CHANGE_ME"

mp_autoteambalance 1
mp_limitteams 2
mp_roundtime 2
mp_maxrounds 30
