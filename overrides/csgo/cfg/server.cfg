hostname "My Docker CS:GO Server"
// Keep secrets out of tracked files. Set via env vars instead:
// - SRCDS_RCONPW for rcon password
// - SRCDS_TOKEN for game server login token
// rcon_password ""
sv_password ""

sv_lan 0
sv_cheats 0
sv_allowupload 0
sv_allowdownload 1

// Update with your public FastDL URL.
// Example: http://203.0.113.10:8080/csgo
sv_downloadurl "http://YOUR_PUBLIC_HOST:8080/csgo"

// Set via SRCDS_TOKEN env var instead of committing a token here.
// sv_setsteamaccount ""

mp_autoteambalance 1
mp_limitteams 2
mp_roundtime 2
mp_maxrounds 30
