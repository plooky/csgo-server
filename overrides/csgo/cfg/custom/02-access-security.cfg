// Access control, anti-abuse, and content download behavior.

sv_lan 0
sv_cheats 0
sv_password ""

sv_allowupload 0
sv_allowdownload 1
sv_downloadurl "http://YOUR_PUBLIC_HOST:8080/csgo"

sv_filterban 1
sv_pure 1
sv_pure_kick_clients 1
sv_allow_wait_command 0

// Keep secrets out of tracked files:
// - set SRCDS_RCONPW in .env or secrets/srcds_rconpw
// - set SRCDS_TOKEN in .env or secrets/srcds_token
