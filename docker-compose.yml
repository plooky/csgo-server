name: csgo-server

services:
  steam-login:
    image: cm2network/steamcmd:latest
    profiles:
      - setup
    stdin_open: true
    tty: true
    environment:
      STEAM_USER: ${STEAM_USER:-}
      STEAM_APP_ID: ${STEAM_APP_ID:-740}
    volumes:
      - ./data/steam:/home/steam/Steam
      - ./data/csgo:/home/steam/csgo-dedicated
      - ./scripts/steam-login.sh:/scripts/steam-login.sh:ro
    command: /bin/bash /scripts/steam-login.sh

  secret-init:
    image: alpine:3.20
    profiles:
      - setup
    stdin_open: true
    tty: true
    environment:
      SECRETS_DIR: /secrets
      FORCE: ${FORCE_SECRET_OVERWRITE:-0}
      PROMPT_MODE: ${SECRET_PROMPT_MODE:-plain}
      SRCDS_TOKEN: ${SRCDS_TOKEN:-}
      SRCDS_RCONPW: ${SRCDS_RCONPW:-}
    volumes:
      - ${SECRETS_DIR:-./secrets}:/secrets
      - ./secrets/init-secrets.sh:/init-secrets.sh:ro
    command: /bin/sh /init-secrets.sh

  plugin-bootstrap:
    image: alpine:3.20
    container_name: csgo-plugin-bootstrap
    restart: "no"
    environment:
      GAME_ROOT: /home/steam/csgo-dedicated/csgo
      DEFAULT_OVERRIDES_ROOT: /overrides-default/csgo
      LOCAL_OVERRIDES_ROOT: /overrides-local/csgo
      MMS_BRANCH: ${MMS_BRANCH:-1.11}
      SM_BRANCH: ${SM_BRANCH:-1.11}
      FORCE_PLUGIN_REINSTALL: ${FORCE_PLUGIN_REINSTALL:-0}
    volumes:
      - ./data/csgo:/home/steam/csgo-dedicated
      - ./overrides:/overrides-default:ro
      - ./overrides.local:/overrides-local:ro
      - ./scripts:/scripts:ro
    command: >
      /bin/sh -lc "apk add --no-cache curl tar gzip unzip >/dev/null &&
      sh /scripts/install-plugins.sh"

  csgo:
    image: cm2network/steamcmd:latest
    container_name: csgo-server
    restart: unless-stopped
    depends_on:
      plugin-bootstrap:
        condition: service_completed_successfully
    environment:
      STEAM_APP_ID: ${STEAM_APP_ID:-740}
      UPDATE_ON_START: ${UPDATE_ON_START:-1}
      STEAM_USER: ${STEAM_USER:-}
      STEAM_PASS: ${STEAM_PASS:-}
      STEAM_GUARD_CODE: ${STEAM_GUARD_CODE:-}
      USE_STEAM_PASSWORD_LOGIN: ${USE_STEAM_PASSWORD_LOGIN:-0}
      STEAM_RUNTIME_APP_ID: ${STEAM_RUNTIME_APP_ID:-1628350}
      SRCDS_TOKEN: ${SRCDS_TOKEN:-}
      SRCDS_HOSTNAME: ${SRCDS_HOSTNAME:-csgo server}
      SRCDS_RCONPW: ${SRCDS_RCONPW:-}
      SRCDS_PW: ${SRCDS_PW:-}
      SRCDS_MAXPLAYERS: ${SRCDS_MAXPLAYERS:-12}
      SRCDS_PORT: ${SRCDS_PORT:-27015}
      SRCDS_CLIENT_PORT: ${SRCDS_CLIENT_PORT:-27005}
      SRCDS_TV_PORT: ${SRCDS_TV_PORT:-27020}
      SRCDS_STARTMAP: ${SRCDS_STARTMAP:-de_dust2}
      SRCDS_MAPGROUP: ${SRCDS_MAPGROUP:-mg_active}
      SRCDS_GAMETYPE: ${SRCDS_GAMETYPE:-0}
      SRCDS_GAMEMODE: ${SRCDS_GAMEMODE:-1}
      TV_ENABLE: ${TV_ENABLE:-1}
      RETRY_ATTEMPTS: ${RETRY_ATTEMPTS:-5}
    volumes:
      - ./data/steam:/home/steam/Steam
      - ./data/csgo:/home/steam/csgo-dedicated
      - ./scripts/run-csgo.sh:/scripts/run-csgo.sh:ro
    command: /bin/bash /scripts/run-csgo.sh
    ports:
      - "${SRCDS_PORT:-27015}:${SRCDS_PORT:-27015}/udp"
      - "${SRCDS_PORT:-27015}:${SRCDS_PORT:-27015}/tcp"
      - "${SRCDS_CLIENT_PORT:-27005}:${SRCDS_CLIENT_PORT:-27005}/udp"
      - "${SRCDS_TV_PORT:-27020}:${SRCDS_TV_PORT:-27020}/udp"

  fastdl:
    image: httpd:2.4-alpine
    container_name: csgo-fastdl
    restart: unless-stopped
    volumes:
      - ./fastdl:/usr/local/apache2/htdocs:ro
      - ./docker/fastdl/fastdl.conf:/usr/local/apache2/conf/extra/fastdl.conf:ro
    command:
      - httpd-foreground
      - -C
      - Include conf/extra/fastdl.conf
    ports:
      - "${FASTDL_PORT:-8080}:80"
